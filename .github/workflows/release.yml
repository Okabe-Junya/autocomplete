name: Release specs

on:
  push:
    branches:
      - master
    paths:
      - "src/**/*.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(date -u +%Y.%m.%d.%H%M)"
          TARBALL="autocomplete-specs-${VERSION}.tar.gz"
          tar -czf "${TARBALL}" build
          SHA256="$(sha256sum "${TARBALL}" | cut -d' ' -f1)"
          gh release create "v${VERSION}" "${TARBALL}" \
            --title "specs v${VERSION}" \
            --notes "Prebuilt completion specs from ${GITHUB_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
      - name: Bump Homebrew formula
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_GITHUB_TOKEN not set; skipping tap bump"
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Okabe-Junya/homebrew-tap.git" tap
          ./scripts/generate-formula.sh "${VERSION}" "${SHA256}" > tap/Formula/autocomplete-specs.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/autocomplete-specs.rb
          git commit -m "chore: bump autocomplete-specs to ${VERSION}"
          git push
